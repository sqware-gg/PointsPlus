  prefix: "&#2b98fdPointsPlus &8› &7"
  no-permission: "&#ED4245No permission."
  players-only: "&#ED4245Only players can use that."
  player-not-found: "&#ED4245No saved points account for that player."
  invalid-amount: "&#ED4245Use a positive amount like &f100&#ED4245, &f1k&#ED4245, or &f1.5m&#ED4245."
  amount-too-low: "&#ED4245Minimum amount is &f{amount}&#ED4245."
  amount-too-high: "&#ED4245Maximum amount is &f{amount}&#ED4245."
  insufficient-funds: "&#ED4245You need &f{amount}&#ED4245. Balance: &f{balance}&#ED4245."
  transaction-failed: "&#ED4245Points transaction failed."
  usage: "&7Usage: &#2b98fd/points <me|pay|look|lead|give|giveall|take|set|reset|broadcast|export|import|reload|save>"
  usage-pay: "&7Usage: &#2b98fd/points pay <player> <amount>"
