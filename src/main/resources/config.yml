# PointsPlus
# Used for update checks.
# Do not change unless you know what you are doing.
config-version: 5

storage:
  # How often balances are persisted to players.yml.
  save-interval-seconds: 300

  # Saves immediately after every successful balance mutation.
  save-on-mutation: true

  # Number of entries shown per leaderboard page.
  leaderboard-page-size: 10

accounts:
  # Admin writes can create accounts for offline names through the server's offline player lookup.
  create-on-admin-write: true

  # Player payments can create target accounts that are not already known.
  # Keeping this false avoids typo-created balances.
  create-pay-targets: false

economy:
  singular-name: "point"
  plural-name: "points"
  symbol: ""
  allow-negative-balances: false
  max-balance: 9223372036854775807

payments:
  enabled: true
  minimum: 1
  maximum: 9223372036854775807
  notify-target: true

placeholders:
  # Registers %pointsplus_*% placeholders when PlaceholderAPI is installed.
  enabled: true

  # Also registers %playerpoints_*% placeholders for easier migrations.
  playerpoints-compatibility: true

